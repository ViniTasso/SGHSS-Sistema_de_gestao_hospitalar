#version: '3.8' na versão antiga era importante, na nova 2.0 não precisa

services:
  # Monolito principal (Sistema de Gestão)
  sghss-monolith:
    build: ./sghss-monolith
    container_name: sghss-monolith
    ports:
      - "8050:8000"
    volumes:
      - ./sghss-monolith:/app
    environment:
      - DATABASE_URL=postgres://user:password@db-postgres:5432/sghss_db
    depends_on:
      - db-postgres
      - authentication-service # Adicione a dependência do serviço de autenticação
      - hyper-connection # Adicione a dependência do serviço de IA


  # Microsserviço de Autenticação
  authentication-service:
    build: ./authentication-service
    container_name: authentication-service
    ports:
      - "8060:8001"
    volumes:
      - ./authentication-service:/app
    environment:
      - MONGO_URL=mongodb://user:password@db-mongodb:27017/auth_db
    depends_on:
      - db-mongodb

  # Banco de Dados PostgreSQL para o monolito
  db-postgres:
    image: postgres:13
    container_name: db-postgres
    ports:
      - "5432:5432"
    volumes:
      - ./databases/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sghss_db

  # Banco de Dados MongoDB para o serviço de autenticação
  db-mongodb:
    image: mongo:4.4
    container_name: db-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./databases/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password

  # Serviço de Conexao com Inteligencia Articial
  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "8070:8002"
    volumes:
      - ./ai-service:/app
    env_file:
      - ./ai-service/.env
  # Conteiner que gerencia todas as requisições    
  hyper-connection:
    build: ./hyper-connection
    # build: 
    #   context: ./hyper-connection
    #   dockerfile: Dockerfile
    container_name: hyper-connection
    ports: 
      - "8080:8003" #adicionar o '-' torna o campo uma Array
    #para desenvolvimento em tempo real
    volumes:
      - ./hyper-connection:/app
    # Para comunicar com outros serviços seria interessante criar uma rede
    #networks:
      #- sghss-network

volumes:
  postgres_data:
  mongodb_data:

# Configuração manual da rede. O compose cria automaticamente, manual para ter controle dos nomes e referências
